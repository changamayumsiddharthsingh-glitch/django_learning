{% extends 'blog/base.html' %}

{% block title %}{{ page.title }} | GlassCMS{% endblock %}

{% block extra_head %}
<style>
    /* Page Layout */
    .page-container {
        max-width: 900px;
        margin: 0 auto 4rem auto;
    }

    .page-header {
        text-align: center;
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--glass-border);
    }

    .page-title {
        font-family: 'Outfit', sans-serif;
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(to right, #a5b4fc, #818cf8, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .page-content {
        font-size: 1.15rem;
        line-height: 1.8;
        color: #e2e8f0;
        font-weight: 300;
    }

    .page-content p {
        margin-bottom: 1.5rem;
    }

    .page-content h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        color: var(--text-primary);
        margin: 2.5rem 0 1rem 0;
    }
</style>
{% endblock %}

{% block content %}
    <div class="glass-card page-container">
        <div class="page-header">
            <h1 class="page-title">{{ page.title }}</h1>
        </div>
        <div class="page-content">
            {{ page.content|linebreaks }}
        </div>
    </div>
{% endblock %}
