<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Here we use Django's template tags to insert the page title -->
    <title>{{ page.title }} | My Django Site</title>
    
    <!-- Google Fonts so our page looks nice -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- We're adding some custom styling to make it look like our home page -->
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 2rem;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #a5b4fc, #6366f1, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            margin-top: 0;
        }

        .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .content {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 2rem;
        }

        /* This is the styling for the "Back" button */
        .back-btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- We output the page title dynamically -->
        <h1>{{ page.title }}</h1>
        
        <!-- We output the created date dynamically, formatted nicely -->
        <div class="meta">
            Published on {{ page.created_at|date:"F j, Y" }}
        </div>
        
        <!-- linebreaks is a Django filter that turns newlines into HTML <p> tags automatically -->
        <div class="content">
            {{ page.content|linebreaks }}
        </div>
        
        <!-- A button that uses Django's "url" tag to link back to the homepage -->
        <a href="{% url 'home' %}" class="back-btn">&larr; Back to Dashboard</a>
    </div>

</body>
</html>
